spring.application.name=auth-service
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/bd_seguridad?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/auth/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.secret=${JWT_SECRET:nutrihealth-jwt-secret-key-change-me-2026-please-use-strong-key-01}
security.jwt.expiration-ms=7200000
