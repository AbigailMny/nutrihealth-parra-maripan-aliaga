spring.application.name=api-alimentos
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/bd_alimento?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
