spring.application.name=api-antecedentes
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/bd_antecedente?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${JWT_SECRET:nutrihealth-jwt-secret-key-change-me-2026-please-use-strong-key-01}
security.internal.secret=${INTERNAL_SECRET:nutrihealth-internal-service-key-2026}

