spring.application.name=apigateway

server.port=9090
security.jwt.secret=${JWT_SECRET:nutrihealth-jwt-secret-key-change-me-2026-please-use-strong-key-01}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8090
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=servicio-nutricionista
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/nutricionistas/**

spring.cloud.gateway.routes[2].id=servicio-paciente
spring.cloud.gateway.routes[2].uri=http://localhost:8085
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/pacientes/**,/api/v1/tipos-dieta/**

spring.cloud.gateway.routes[3].id=servicio-recetas
spring.cloud.gateway.routes[3].uri=http://localhost:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/recetas/**,/api/v1/ingredientes/**

spring.cloud.gateway.routes[4].id=servicio-alimentos
spring.cloud.gateway.routes[4].uri=http://localhost:8083
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/alimentos/**,/api/v1/categorias/**

spring.cloud.gateway.routes[5].id=servicio-citas
spring.cloud.gateway.routes[5].uri=http://localhost:8084
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/citas/**

spring.cloud.gateway.routes[6].id=servicio-minutas
spring.cloud.gateway.routes[6].uri=http://localhost:8086
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/minutas/**

spring.cloud.gateway.routes[7].id=servicio-antecedentes
spring.cloud.gateway.routes[7].uri=http://localhost:8087
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/antecedentes/**,/api/v1/enfermedades/**,/api/v1/alergias/**,/api/v1/medicamentos/**

spring.cloud.gateway.routes[8].id=servicio-rutinas
spring.cloud.gateway.routes[8].uri=http://localhost:8089
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/rutinas/**

spring.cloud.gateway.routes[9].id=servicio-metas
spring.cloud.gateway.routes[9].uri=http://localhost:8088
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/metas/**

spring.cloud.gateway.routes[10].id=servicio-mediciones
spring.cloud.gateway.routes[10].uri=http://localhost:8091
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/mediciones/**

# CONFIGURACIÓN GLOBAL DE CORS (Evita el Failed to Fetch)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:9090
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# CONFIGURACIÓN DE EUREKA
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# 5. CONFIGURACIÓN DEL MENÚ DESPLEGABLE DE SWAGGER UI

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Servicio Auth
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=Servicio Nutricionistas
springdoc.swagger-ui.urls[1].url=/api/v1/nutricionistas/v3/api-docs

