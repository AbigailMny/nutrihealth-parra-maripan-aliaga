spring.application.name=apigateway

server.port=9090
spring.cloud.gateway.routes[0].id=servicio-nutricionista
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/nutricionistas/**

spring.cloud.gateway.routes[1].id=servicio-paciente
spring.cloud.gateway.routes[1].uri=http://localhost:8085
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/pacientes/**

spring.cloud.gateway.routes[2].id=servicio-recetas
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/recetas/**

spring.cloud.gateway.routes[3].id=servicio-alimentos
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/alimentos/**
